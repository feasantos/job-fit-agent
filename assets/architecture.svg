<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Arquitetura do Job Fit Agent</title>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; }
  .leg-label { font-size: 11px; }

  /* Light mode */
  .bg { fill: #ffffff; }
  .th { fill: #1a1a1a; }
  .ts { fill: #444; }
  .leg-label { fill: #666; }

  .box-gray { fill: #f0f0f0; stroke: #999; }
  .box-blue { fill: #dbeafe; stroke: #3b82f6; }
  .box-teal { fill: #d1fae5; stroke: #059669; }
  .box-purple { fill: #ede9fe; stroke: #7c3aed; }
  .box-amber { fill: #fef3c7; stroke: #d97706; }
  .box-green { fill: #dcfce7; stroke: #16a34a; }

  .t-gray { fill: #333; }
  .t-blue { fill: #1d4ed8; }
  .t-teal { fill: #065f46; }
  .t-purple { fill: #5b21b6; }
  .t-amber { fill: #92400e; }
  .t-green { fill: #14532d; }
  .t-sub-gray { fill: #555; }
  .t-sub-blue { fill: #2563eb; }
  .t-sub-teal { fill: #047857; }
  .t-sub-purple { fill: #6d28d9; }
  .t-sub-amber { fill: #b45309; }
  .t-sub-green { fill: #15803d; }

  .arr-main { stroke: #999; }
  .arr-yes { stroke: #16a34a; }
  .arr-no { stroke: #999; }
  .arr-loop { stroke: #bbb; }
  .t-yes { fill: #15803d; }
  .t-no { fill: #888; }
  .t-loop { fill: #aaa; }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .th { fill: #f0f0f0; }
    .ts { fill: #bbb; }
    .leg-label { fill: #999; }

    .box-gray { fill: #2a2a2a; stroke: #666; }
    .box-blue { fill: #1e3a5f; stroke: #60a5fa; }
    .box-teal { fill: #064e3b; stroke: #34d399; }
    .box-purple { fill: #2e1065; stroke: #a78bfa; }
    .box-amber { fill: #451a03; stroke: #fbbf24; }
    .box-green { fill: #052e16; stroke: #4ade80; }

    .t-gray { fill: #e5e5e5; }
    .t-blue { fill: #93c5fd; }
    .t-teal { fill: #6ee7b7; }
    .t-purple { fill: #c4b5fd; }
    .t-amber { fill: #fcd34d; }
    .t-green { fill: #86efac; }
    .t-sub-gray { fill: #aaa; }
    .t-sub-blue { fill: #7ab8f5; }
    .t-sub-teal { fill: #5ecea0; }
    .t-sub-purple { fill: #b09ef5; }
    .t-sub-amber { fill: #f5c842; }
    .t-sub-green { fill: #6ddb8e; }

    .arr-main { stroke: #666; }
    .arr-yes { stroke: #4ade80; }
    .arr-no { stroke: #666; }
    .arr-loop { stroke: #444; }
    .t-yes { fill: #4ade80; }
    .t-no { fill: #666; }
    .t-loop { fill: #555; }
  }
</style>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- BLOCO 1: GATILHO -->
<rect class="box-gray" x="30" y="40" width="170" height="80" rx="12" stroke-width="0.5"/>
<text class="th t-gray" x="115" y="72" text-anchor="middle">Gatilho</text>
<text class="ts t-sub-gray" x="115" y="91" text-anchor="middle">Schedule Trigger</text>
<text class="ts t-sub-gray" x="115" y="107" text-anchor="middle">a cada 2 horas</text>

<line x1="200" y1="80" x2="228" y2="80" class="arr-main" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>

<!-- BLOCO 2: COLETA -->
<rect class="box-blue" x="230" y="40" width="170" height="80" rx="12" stroke-width="0.5"/>
<text class="th t-blue" x="315" y="72" text-anchor="middle">Coleta de vagas</text>
<text class="ts t-sub-blue" x="315" y="91" text-anchor="middle">HTTP Request</text>
<text class="ts t-sub-blue" x="315" y="107" text-anchor="middle">Remotive API</text>

<line x1="400" y1="80" x2="428" y2="80" class="arr-main" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>

<!-- BLOCO 3: SPLIT/LOOP -->
<rect class="box-teal" x="430" y="40" width="210" height="80" rx="12" stroke-width="0.5"/>
<text class="th t-teal" x="535" y="72" text-anchor="middle">Separacao</text>
<text class="ts t-sub-teal" x="535" y="91" text-anchor="middle">Split Out + Loop</text>
<text class="ts t-sub-teal" x="535" y="107" text-anchor="middle">1 vaga por vez</text>

<!-- Seta para baixo -->
<line x1="535" y1="120" x2="535" y2="168" class="arr-main" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>

<!-- BLOCO 4: IA -->
<rect class="box-purple" x="380" y="170" width="210" height="90" rx="12" stroke-width="0.5"/>
<text class="th t-purple" x="485" y="200" text-anchor="middle">Avaliacao por IA</text>
<text class="ts t-sub-purple" x="485" y="220" text-anchor="middle">OpenRouter API</text>
<text class="ts t-sub-purple" x="485" y="238" text-anchor="middle">Score 0-10 de fit</text>

<!-- Seta da IA para o filtro -->
<line x1="485" y1="260" x2="485" y2="308" class="arr-main" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>

<!-- BLOCO 5: FILTRO -->
<rect class="box-amber" x="345" y="310" width="220" height="80" rx="12" stroke-width="0.5"/>
<text class="th t-amber" x="455" y="338" text-anchor="middle">Filtro</text>
<text class="ts t-sub-amber" x="455" y="357" text-anchor="middle">IF node</text>
<text class="ts t-sub-amber" x="455" y="374" text-anchor="middle">Score maior ou igual 7?</text>

<!-- Seta SIM -->
<line x1="565" y1="350" x2="598" y2="350" class="arr-yes" stroke-width="1.5" marker-end="url(#arr-g)" fill="none"/>
<text class="t-yes" x="580" y="344" text-anchor="middle" font-size="11" font-family="-apple-system, sans-serif">sim</text>

<!-- BLOCO 6: TELEGRAM -->
<rect class="box-green" x="600" y="310" width="68" height="80" rx="12" stroke-width="0.5"/>
<text class="th t-green" x="634" y="338" text-anchor="middle">Tele</text>
<text class="ts t-sub-green" x="634" y="357" text-anchor="middle">gram</text>
<text class="ts t-sub-green" x="634" y="374" text-anchor="middle">Bot</text>

<!-- Seta NAO -->
<line x1="345" y1="350" x2="292" y2="350" class="arr-no" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)" fill="none"/>
<text class="t-no" x="317" y="344" text-anchor="middle" font-size="11" font-family="-apple-system, sans-serif">nao</text>

<!-- BLOCO 7: IGNORAR -->
<rect class="box-gray" x="140" y="310" width="150" height="80" rx="12" stroke-width="0.5"/>
<text class="th t-gray" x="215" y="338" text-anchor="middle">Ignorar</text>
<text class="ts t-sub-gray" x="215" y="357" text-anchor="middle">No Operation</text>
<text class="ts t-sub-gray" x="215" y="374" text-anchor="middle">proxima vaga</text>

<!-- Linha de retorno do loop -->
<path d="M215 390 L215 450 L485 450 L485 400" fill="none" class="arr-loop" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<path d="M634 390 L634 450 L485 450" fill="none" class="arr-loop" stroke-width="1" stroke-dasharray="4 3"/>
<text class="t-loop" x="340" y="470" text-anchor="middle" font-size="11" font-family="-apple-system, sans-serif">proximo item do loop</text>

<!-- LEGENDA -->
<rect class="box-gray" x="30" y="490" width="12" height="12" rx="2" stroke-width="0.5"/>
<text class="leg-label" x="48" y="501" dominant-baseline="central">Controle</text>
<rect class="box-blue" x="120" y="490" width="12" height="12" rx="2" stroke-width="0.5"/>
<text class="leg-label" x="138" y="501" dominant-baseline="central">Dados</text>
<rect class="box-purple" x="195" y="490" width="12" height="12" rx="2" stroke-width="0.5"/>
<text class="leg-label" x="213" y="501" dominant-baseline="central">IA</text>
<rect class="box-amber" x="240" y="490" width="12" height="12" rx="2" stroke-width="0.5"/>
<text class="leg-label" x="258" y="501" dominant-baseline="central">Decisao</text>
<rect class="box-green" x="325" y="490" width="12" height="12" rx="2" stroke-width="0.5"/>
<text class="leg-label" x="343" y="501" dominant-baseline="central">Notificacao</text>
</svg>

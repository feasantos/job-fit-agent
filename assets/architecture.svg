<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Arquitetura do Job Fit Agent</title>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .arr { stroke-width: 1.5; fill: none; }
  .leg-label { font-size: 11px; fill: #555; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- BLOCO 1: GATILHO -->
<rect x="30" y="40" width="170" height="80" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="115" y="72" text-anchor="middle">Gatilho</text>
<text class="ts" x="115" y="91" text-anchor="middle">Schedule Trigger</text>
<text class="ts" x="115" y="107" text-anchor="middle">a cada 2 horas</text>

<line x1="200" y1="80" x2="228" y2="80" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- BLOCO 2: COLETA -->
<rect x="230" y="40" width="170" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="315" y="72" text-anchor="middle" fill="#0C447C">Coleta de vagas</text>
<text class="ts" x="315" y="91" text-anchor="middle" fill="#185FA5">HTTP Request</text>
<text class="ts" x="315" y="107" text-anchor="middle" fill="#185FA5">Remotive API</text>

<line x1="400" y1="80" x2="428" y2="80" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- BLOCO 3: SPLIT/LOOP -->
<rect x="430" y="40" width="210" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="535" y="72" text-anchor="middle" fill="#085041">Separacao</text>
<text class="ts" x="535" y="91" text-anchor="middle" fill="#0F6E56">Split Out + Loop</text>
<text class="ts" x="535" y="107" text-anchor="middle" fill="#0F6E56">1 vaga por vez</text>

<!-- Seta para baixo -->
<line x1="535" y1="120" x2="535" y2="168" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- BLOCO 4: IA -->
<rect x="380" y="170" width="210" height="90" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="485" y="200" text-anchor="middle" fill="#3C3489">Avaliacao por IA</text>
<text class="ts" x="485" y="220" text-anchor="middle" fill="#534AB7">OpenRouter API</text>
<text class="ts" x="485" y="238" text-anchor="middle" fill="#534AB7">Score 0-10 de fit</text>

<!-- Seta da IA para o filtro -->
<line x1="485" y1="260" x2="485" y2="308" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- BLOCO 5: FILTRO -->
<rect x="345" y="310" width="210" height="80" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="450" y="338" text-anchor="middle" fill="#633806">Filtro</text>
<text class="ts" x="450" y="357" text-anchor="middle" fill="#854F0B">IF node</text>
<text class="ts" x="450" y="374" text-anchor="middle" fill="#854F0B">Score maior ou igual 7?</text>

<!-- Seta SIM -->
<line x1="555" y1="350" x2="598" y2="350" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)" fill="none"/>
<text x="574" y="344" text-anchor="middle" font-size="11" fill="#3B6D11" font-family="-apple-system, sans-serif">sim</text>

<!-- BLOCO 6: TELEGRAM -->
<rect x="600" y="310" width="68" height="80" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="634" y="338" text-anchor="middle" fill="#27500A">Tele</text>
<text class="ts" x="634" y="357" text-anchor="middle" fill="#3B6D11">gram</text>
<text class="ts" x="634" y="374" text-anchor="middle" fill="#3B6D11">Bot</text>

<!-- Seta NAO -->
<line x1="345" y1="350" x2="292" y2="350" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-gray)" fill="none"/>
<text x="317" y="344" text-anchor="middle" font-size="11" fill="#888" font-family="-apple-system, sans-serif">nao</text>

<!-- BLOCO 7: IGNORAR -->
<rect x="140" y="310" width="150" height="80" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="215" y="338" text-anchor="middle" fill="#2C2C2A">Ignorar</text>
<text class="ts" x="215" y="357" text-anchor="middle" fill="#5F5E5A">No Operation</text>
<text class="ts" x="215" y="374" text-anchor="middle" fill="#5F5E5A">proxima vaga</text>

<!-- Linha de retorno do loop -->
<path d="M215 390 L215 450 L485 450 L485 400" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M634 390 L634 450 L485 450" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
<text x="340" y="470" text-anchor="middle" font-size="11" fill="#aaa" font-family="-apple-system, sans-serif">proximo item do loop</text>

<!-- LEGENDA -->
<rect x="30" y="490" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="leg-label" x="48" y="501" dominant-baseline="central">Controle</text>
<rect x="120" y="490" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="leg-label" x="138" y="501" dominant-baseline="central">Dados</text>
<rect x="195" y="490" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="leg-label" x="213" y="501" dominant-baseline="central">IA</text>
<rect x="240" y="490" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="leg-label" x="258" y="501" dominant-baseline="central">Decisao</text>
<rect x="325" y="490" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="leg-label" x="343" y="501" dominant-baseline="central">Notificacao</text>
</svg>
